site_name: clearscript
site_description: Local-first ASR transcript editor with a compounding terminology library. Bring your own model.
site_url: https://chen17-sq.github.io/clearscript/
repo_url: https://github.com/Chen17-sq/clearscript
repo_name: Chen17-sq/clearscript
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Outfit
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: clearscript-bauhaus
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/logo.svg

extra_css:
  - assets/bauhaus.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Chen17-sq/clearscript
  generator: false

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Installation: installation.md
  - Manifesto: manifesto.md
  - Architecture: architecture.md
  - Design system: DESIGN_SYSTEM.md
  - Roadmap: ROADMAP.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: ¶
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
