<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" role="img" aria-label="clearscript — local-first ASR transcript editor">
  <title>clearscript</title>
  <desc>Bauhaus banner: bold wordmark with overlapping geometric composition in primary red, blue, and yellow.</desc>

  <defs>
    <pattern id="dotgrid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#121212" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Canvas + dot grid -->
  <rect width="1280" height="380" fill="#F0F0F0"/>
  <rect width="1280" height="380" fill="url(#dotgrid)"/>

  <!-- Outer thick border -->
  <rect x="6" y="6" width="1268" height="368" fill="none" stroke="#121212" stroke-width="10"/>

  <!-- ============ LEFT: wordmark + tagline + pills ============ -->
  <g font-family="'Inter', 'Helvetica Neue', system-ui, sans-serif">
    <text x="64" y="178" font-size="124" font-weight="900" fill="#121212" letter-spacing="-4">clearscript</text>

    <!-- Heavy underline -->
    <line x1="64" y1="206" x2="600" y2="206" stroke="#121212" stroke-width="6"/>

    <!-- Tagline (uppercase tracked) -->
    <text x="64" y="244" font-size="20" font-weight="800" fill="#121212" letter-spacing="3.5">LOCAL-FIRST  ·  BRING YOUR OWN MODEL  ·  COMPOUNDING LIBRARY</text>

    <!-- Subtitle -->
    <text x="64" y="278" font-size="17" font-weight="500" fill="#3A3A3A">An ASR transcript editor that gets sharper with every use.</text>

    <!-- Three colored tag pills -->
    <g transform="translate(64 304)">
      <!-- Red pill -->
      <rect x="4" y="4" width="120" height="36" fill="#121212"/>
      <rect x="0" y="0" width="120" height="36" fill="#D02020" stroke="#121212" stroke-width="3"/>
      <text x="60" y="24" font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="2.5">PYTHON</text>

      <!-- Blue pill -->
      <rect x="140" y="4" width="120" height="36" fill="#121212"/>
      <rect x="136" y="0" width="120" height="36" fill="#1040C0" stroke="#121212" stroke-width="3"/>
      <text x="196" y="24" font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="2.5">SVELTEKIT</text>

      <!-- Yellow pill -->
      <rect x="276" y="4" width="120" height="36" fill="#121212"/>
      <rect x="272" y="0" width="120" height="36" fill="#F0C020" stroke="#121212" stroke-width="3"/>
      <text x="332" y="24" font-size="13" font-weight="800" fill="#121212" text-anchor="middle" letter-spacing="2.5">SQLITE</text>

      <!-- White pill -->
      <rect x="412" y="4" width="120" height="36" fill="#121212"/>
      <rect x="408" y="0" width="120" height="36" fill="#FFFFFF" stroke="#121212" stroke-width="3"/>
      <text x="468" y="24" font-size="13" font-weight="800" fill="#121212" text-anchor="middle" letter-spacing="2.5">MIT</text>
    </g>
  </g>

  <!-- ============ RIGHT: Bauhaus geometric composition ============ -->
  <g transform="translate(820 38)">
    <!-- Yellow triangle (back layer) -->
    <polygon points="148,278 392,278 270,68" fill="#121212"/>
    <polygon points="140,270 384,270 262,60" fill="#F0C020" stroke="#121212" stroke-width="6"/>

    <!-- Blue rotated square (middle layer) -->
    <g transform="translate(316 196) rotate(45)">
      <rect x="-78" y="-70" width="156" height="156" fill="#121212"/>
    </g>
    <g transform="translate(308 188) rotate(45)">
      <rect x="-78" y="-78" width="156" height="156" fill="#1040C0" stroke="#121212" stroke-width="6"/>
    </g>

    <!-- Red circle (front layer) -->
    <circle cx="158" cy="216" r="82" fill="#121212"/>
    <circle cx="150" cy="208" r="82" fill="#D02020" stroke="#121212" stroke-width="6"/>

    <!-- Tiny accent: small white square inside the red circle -->
    <rect x="138" y="196" width="24" height="24" fill="#FFFFFF" stroke="#121212" stroke-width="3"/>
  </g>

  <!-- ============ Tiny corner accents ============ -->
  <!-- Yellow square top-right -->
  <rect x="1208" y="28" width="38" height="38" fill="#121212"/>
  <rect x="1204" y="24" width="38" height="38" fill="#F0C020" stroke="#121212" stroke-width="4"/>

  <!-- Blue circle bottom-right -->
  <circle cx="1228" cy="338" r="16" fill="#121212"/>
  <circle cx="1224" cy="334" r="16" fill="#1040C0" stroke="#121212" stroke-width="4"/>
</svg>
