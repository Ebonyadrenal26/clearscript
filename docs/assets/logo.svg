<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="clearscript logo">
  <title>clearscript logo</title>
  <desc>Bauhaus mark composed of a yellow triangle, a blue rotated square, and a red circle with hard offset shadows.</desc>

  <rect width="220" height="220" fill="#F0F0F0"/>
  <rect x="4" y="4" width="212" height="212" fill="none" stroke="#121212" stroke-width="6"/>

  <!-- Yellow triangle (back) -->
  <polygon points="64,162 184,162 124,46" fill="#121212"/>
  <polygon points="60,158 180,158 120,42" fill="#F0C020" stroke="#121212" stroke-width="4"/>

  <!-- Blue rotated square (middle) -->
  <g transform="translate(150 124) rotate(45)">
    <rect x="-44" y="-40" width="88" height="88" fill="#121212"/>
  </g>
  <g transform="translate(146 120) rotate(45)">
    <rect x="-44" y="-44" width="88" height="88" fill="#1040C0" stroke="#121212" stroke-width="4"/>
  </g>

  <!-- Red circle (front) -->
  <circle cx="78" cy="138" r="46" fill="#121212"/>
  <circle cx="74" cy="134" r="46" fill="#D02020" stroke="#121212" stroke-width="4"/>
</svg>
