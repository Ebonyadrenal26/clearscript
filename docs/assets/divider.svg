<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 32" role="img" aria-label="section divider">
  <title>section divider</title>
  <rect x="0" y="14" width="1280" height="4" fill="#121212"/>

  <!-- Yellow square -->
  <rect x="200" y="6" width="20" height="20" fill="#F0C020" stroke="#121212" stroke-width="3"/>

  <!-- Red circle -->
  <circle cx="500" cy="16" r="10" fill="#D02020" stroke="#121212" stroke-width="3"/>

  <!-- Blue rotated square -->
  <g transform="translate(800 16) rotate(45)">
    <rect x="-9" y="-9" width="18" height="18" fill="#1040C0" stroke="#121212" stroke-width="3"/>
  </g>

  <!-- Yellow triangle -->
  <polygon points="1080,26 1100,26 1090,4" fill="#F0C020" stroke="#121212" stroke-width="3"/>
</svg>
